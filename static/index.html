<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד סימניות</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-color: #0f172a;
    --text-color: #f8fafc;
    --glass-bg: rgba(30, 41, 59, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Heebo', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    min-height: 100vh;
    background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
}

.container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

header { text-align: center; margin-bottom: 2rem; }

header h1 {
    font-size: 2.5rem; margin-bottom: 0.5rem;
    background: linear-gradient(to right, #60a5fa, #a78bfa);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
}

.glass {
    background: var(--glass-bg);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 16px; padding: 2rem;
    box-shadow: 0 4px 30px rgba(0,0,0,0.1);
}

.control-panel { margin-bottom: 2rem; }

.input-group { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
.input-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
.input-group div { flex-grow: 1; }

input[type="text"], select {
    width: 100%; flex-grow: 1;
    padding: 0.75rem 1rem; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(15,23,42,0.6); color: white;
    font-family: 'Heebo', sans-serif; font-size: 1rem;
    outline: none; transition: all 0.3s ease;
}
input[type="text"]:focus, select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
}

.btn {
    padding: 0.75rem 1.5rem; border: none; border-radius: 8px;
    font-family: 'Heebo', sans-serif; font-weight: 600; font-size: 1rem;
    cursor: pointer; transition: all 0.3s ease;
}
.btn.primary { background: var(--primary); color: white; }
.btn.primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
.btn.ghost {
    background: rgba(255,255,255,0.07); color: #cbd5e1;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 0.5rem 0.9rem; font-size: 0.85rem;
}
.btn.ghost:hover { background: rgba(255,255,255,0.13); }

.hidden { display: none !important; }

#loading { text-align: center; margin-top: 1.5rem; }
.spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.1);
    border-left-color: var(--primary);
    border-radius: 50%; animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Stats ─────────────────────────────────────────────────── */
.stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem; margin-bottom: 2rem;
}
.stat-card { padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s ease; }
.stat-card:hover { transform: translateY(-5px); }
.stat-card h3 { font-size: 1rem; font-weight: 400; color: #94a3b8; margin-bottom: 0.5rem; }
.stat-card .value { font-size: 2.5rem; font-weight: 800; }
.stat-card.success .value  { color: var(--success); }
.stat-card.danger .value   { color: var(--danger); }
.stat-card.warning .value  { color: var(--warning); }
.stat-card.protected .value { color: #8b5cf6; }

/* ─── Controls bar ───────────────────────────────────────────── */
.table-controls {
    display: flex; gap: 0.75rem; margin-bottom: 1rem;
    align-items: center; flex-wrap: wrap;
}

/* ─── Badges ─────────────────────────────────────────────────── */
.badge {
    padding: 0.2rem 0.45rem; border-radius: 999px;
    font-size: 0.72rem; font-weight: 600; white-space: nowrap; flex-shrink: 0;
}
.status-ok        { background: rgba(16,185,129,0.2);  color: #34d399; }
.status-protected { background: rgba(139,92,246,0.2);  color: #a78bfa; }
.status-error     { background: rgba(239,68,68,0.2);   color: #f87171; }
.status-redirect  { background: rgba(245,158,11,0.2);  color: #fbbf24; }

/* ─── Action Buttons ─────────────────────────────────────────── */
.btn-group { display: flex; gap: 0.25rem; flex-shrink: 0; }
.action-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; padding: 0; cursor: pointer;
    transition: all 0.2s; color: white; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; font-size: 0.85rem;
}
.action-btn:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-1px); }
a { color: #60a5fa; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ─── Tree View ──────────────────────────────────────────────── */
.tree-container { padding: 0.25rem 0; }

.tree-info {
    font-size: 0.82rem; color: #64748b;
    padding: 0.3rem 0.5rem 0.75rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 0.5rem;
}

.tree-folder { margin-bottom: 0.1rem; }

.folder-header {
    display: flex; align-items: center; gap: 0.45rem;
    padding: 0.4rem 0.6rem; border-radius: 8px;
    cursor: pointer; transition: background 0.15s; user-select: none;
}
.folder-header:hover { background: rgba(255,255,255,0.05); }

.folder-toggle {
    font-size: 0.55rem; color: #64748b;
    width: 12px; display: inline-block;
    text-align: center; transition: transform 0.18s; flex-shrink: 0;
}
.folder-toggle.open { transform: rotate(90deg); }

.folder-icon { font-size: 0.9rem; flex-shrink: 0; }

.folder-name { font-weight: 600; color: #e2e8f0; font-size: 0.92rem; }

.folder-meta {
    margin-right: auto;
    display: flex; align-items: center; gap: 0.4rem;
}
.folder-total { font-size: 0.72rem; color: #475569; }

.folder-broken-badge {
    font-size: 0.68rem; background: rgba(239,68,68,0.15);
    color: #f87171; border-radius: 999px; padding: 0.1rem 0.38rem; font-weight: 600;
}
.folder-redirect-badge {
    font-size: 0.68rem; background: rgba(245,158,11,0.15);
    color: #fbbf24; border-radius: 999px; padding: 0.1rem 0.38rem; font-weight: 600;
}

.folder-children {
    padding-right: 1.1rem;
    border-right: 1px solid rgba(255,255,255,0.07);
    margin-right: 0.9rem;
}
.folder-children.collapsed { display: none; }

/* ─── Bookmark Row ───────────────────────────────────────────── */
.bookmark-row {
    display: flex; align-items: center; gap: 0.55rem;
    padding: 0.32rem 0.6rem; border-radius: 8px;
    transition: background 0.15s; min-width: 0;
}
.bookmark-row:hover { background: rgba(255,255,255,0.03); }

.bookmark-name {
    font-size: 0.86rem; color: #cbd5e1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 60px;
}
.bookmark-url {
    font-size: 0.73rem; color: #60a5fa;
    direction: ltr; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; max-width: 240px; flex-shrink: 0;
}
.bookmark-url:hover { text-decoration: underline; }
.bookmark-error {
    font-size: 0.7rem; color: #f87171;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 160px; flex-shrink: 0;
}

/* ─── Modal ──────────────────────────────────────────────────── */
.modal {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1000;
    display: flex; justify-content: center; align-items: center;
}
.modal-content {
    background: var(--bg-color); padding: 2rem; border-radius: 16px;
    width: 90%; max-width: 600px; max-height: 80vh;
    overflow-y: auto; position: relative;
}
.close-modal {
    position: absolute; top: 1rem; right: 1.5rem;
    font-size: 1.5rem; cursor: pointer; color: #94a3b8;
}
.close-modal:hover { color: white; }
.search-result-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 1rem; margin-bottom: 1rem; text-align: right;
}
.search-result-item h4 { margin-bottom: 0.5rem; color: #60a5fa; }
.search-result-item p  { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 0.5rem; }
.search-result-item .search-url {
    font-size: 0.8rem; color: #34d399;
    direction: ltr; text-align: left; margin-bottom: 0.5rem; word-break: break-all;
}
.use-btn { font-size: 0.85rem; padding: 0.4rem 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem;">
            <div>
                <h1>🔍 בודק הסימניות שלי</h1>
                <p>גלה אילו קישורים שבורים, איטיים או הועברו לכתובת חדשה.</p>
            </div>
            <div style="display:flex; gap:0.5rem;">
                <button id="restartBtn" class="btn ghost">🔄 הפעל שרת מחדש</button>
                <button id="clearCacheBtn" class="btn" style="font-size:0.9rem;padding:0.5rem 1rem;background:#ef4444;color:white;">🗑️ רענן דף ומטמון</button>
            </div>
        </header>

        <section class="control-panel glass">
            <div class="input-group">
                <label for="filePath">נתיב קובץ תווית (bookmarks.html):</label>
                <input type="text" id="filePath" value="C:\Users\Roni\Downloads\favorites_27.2.2026.html" placeholder="C:\path\to\bookmarks.html">
                <button id="scanBtn" class="btn primary">התחל סריקה 🚀</button>
            </div>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>סורק קישורים... אנא המתן (זה עשוי לקחת כמה דקות בהתאם לכמות הסימניות).</p>
            </div>
        </section>

        <section id="dashboard" class="hidden">
            <!-- Stat Cards -->
            <div class="stats-grid">
                <div class="stat-card glass" data-filter="all">
                    <h3>סה"כ סימניות</h3>
                    <div class="value" id="statTotal">0</div>
                </div>
                <div class="stat-card glass success" data-filter="ok">
                    <h3>✅ תקינים (200)</h3>
                    <div class="value" id="statOk">0</div>
                </div>
                <div class="stat-card glass danger" data-filter="broken">
                    <h3>❌ שבורים / שגיאות</h3>
                    <div class="value" id="statBroken">0</div>
                </div>
                <div class="stat-card glass protected" data-filter="protected">
                    <h3>🛡️ מוגנים (401/402/403)</h3>
                    <div class="value" id="statProtected">0</div>
                </div>
                <div class="stat-card glass warning" data-filter="redirect">
                    <h3>🔄 הפניות מחדש</h3>
                    <div class="value" id="statRedirect">0</div>
                </div>
            </div>

            <!-- Tree Panel -->
            <div class="glass" style="padding:1.5rem;">
                <div class="table-controls">
                    <input type="text" id="searchInput" placeholder="חפש קישור, שם או תיקייה..." style="flex:1; min-width:180px;">
                    <select id="statusFilter" style="width:auto; flex-shrink:0;">
                        <option value="all">הכל</option>
                        <option value="ok">תקינים (200)</option>
                        <option value="protected">מוגנים (401/402/403)</option>
                        <option value="broken">שבורים</option>
                        <option value="redirect">הפניות מחדש</option>
                    </select>
                    <button id="expandAllBtn" class="btn ghost">📂 פתח הכל</button>
                    <button id="collapseAllBtn" class="btn ghost">📁 סגור הכל</button>
                </div>
                <div id="treeCount" class="tree-info"></div>
                <div id="treeContainer" class="tree-container"></div>
            </div>
        </section>
    </div>

    <!-- Search Modal -->
    <div id="searchModal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-modal" id="closeSearchModal">&times;</span>
            <h2>חיפוש חלופות ברשת 🔍</h2>
            <p id="searchQueryText" style="margin-bottom:1rem; color:#94a3b8;"></p>
            <div id="searchResults" class="search-results-container"></div>
        </div>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    const scanBtn        = document.getElementById('scanBtn');
    const filePathInput  = document.getElementById('filePath');
    const loading        = document.getElementById('loading');
    const dashboard      = document.getElementById('dashboard');
    const searchInput    = document.getElementById('searchInput');
    const statusFilter   = document.getElementById('statusFilter');
    const treeContainer  = document.getElementById('treeContainer');
    const treeCount      = document.getElementById('treeCount');
    const restartBtn     = document.getElementById('restartBtn');
    const clearCacheBtn  = document.getElementById('clearCacheBtn');
    const expandAllBtn   = document.getElementById('expandAllBtn');
    const collapseAllBtn = document.getElementById('collapseAllBtn');

    const statTotal     = document.getElementById('statTotal');
    const statOk        = document.getElementById('statOk');
    const statBroken    = document.getElementById('statBroken');
    const statProtected = document.getElementById('statProtected');
    const statRedirect  = document.getElementById('statRedirect');

    let allResults = [];

    // ── Restart ───────────────────────────────────────────────
    if (restartBtn) {
        restartBtn.addEventListener('click', async () => {
            if (!confirm('האם אתה בטוח שברצונך להפעיל מחדש את השרת?')) return;
            try {
                restartBtn.disabled = true;
                restartBtn.textContent = 'מפעיל מחדש...';
                await fetch('/api/restart', { method: 'POST' });
            } catch (e) { /* ignore disconnect */ }
            setTimeout(() => window.location.reload(), 2500);
        });
    }

    if (clearCacheBtn) {
        clearCacheBtn.addEventListener('click', () => {
            const url = new URL(window.location.href);
            url.searchParams.set('v', Date.now());
            window.location.href = url.toString();
        });
    }

    // ── Expand / Collapse All ─────────────────────────────────
    expandAllBtn.addEventListener('click', () => setAllFolders(true));
    collapseAllBtn.addEventListener('click', () => setAllFolders(false));

    function setAllFolders(open) {
        treeContainer.querySelectorAll('.folder-header').forEach(header => {
            const toggle   = header.querySelector('.folder-toggle');
            const children = header.nextElementSibling;
            if (!toggle || !children) return;
            toggle.classList.toggle('open', open);
            children.classList.toggle('collapsed', !open);
        });
    }

    // ── Scan ──────────────────────────────────────────────────
    scanBtn.addEventListener('click', async () => {
        const filePath = filePathInput.value.trim();
        if (!filePath) { alert('אנא הזן נתיב לקובץ הסימניות'); return; }

        scanBtn.disabled = true;
        loading.classList.remove('hidden');
        dashboard.classList.add('hidden');

        try {
            const response = await fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_path: filePath })
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'שגיאה בסריקה');
            }
            const data = await response.json();
            allResults = data.results;
            updateDashboard();
            dashboard.classList.remove('hidden');
        } catch (error) {
            alert('שגיאה: ' + error.message);
        } finally {
            scanBtn.disabled = false;
            loading.classList.add('hidden');
        }
    });

    // ── Status Category ───────────────────────────────────────
    function getStatusCategory(result) {
        if (result.is_redirect) return 'redirect';
        if (result.status >= 200 && result.status < 300) return 'ok';
        if (result.status === 401 || result.status === 402 || result.status === 403) return 'protected';
        if (result.status >= 400 || result.status === 0) return 'broken';
        return 'other';
    }

    // ── Dashboard Update ──────────────────────────────────────
    function updateDashboard() {
        let ok = 0, prot = 0, broken = 0, redir = 0;
        allResults.forEach(r => {
            const c = getStatusCategory(r);
            if (c === 'ok') ok++;
            else if (c === 'protected') prot++;
            else if (c === 'broken') broken++;
            else if (c === 'redirect') redir++;
        });
        statTotal.textContent     = allResults.length;
        statOk.textContent        = ok;
        statProtected.textContent = prot;
        statBroken.textContent    = broken;
        statRedirect.textContent  = redir;
        renderTree();
    }

    // ── Folder Path Parsing ───────────────────────────────────
    // folder string format from backend: "/ FolderA / FolderB"  or  "/"
    function parseFolderParts(folder) {
        if (!folder) return [];
        const cleaned = folder.replace(/^\/\s*/, '').trim();
        if (!cleaned) return [];
        return cleaned.split(' / ').map(s => s.trim()).filter(Boolean);
    }

    // ── Build Tree ────────────────────────────────────────────
    function buildTree(results) {
        const root = { name: '', children: new Map(), bookmarks: [] };
        results.forEach(res => {
            const parts = parseFolderParts(res.folder);
            let node = root;
            for (const part of parts) {
                if (!node.children.has(part)) {
                    node.children.set(part, { name: part, children: new Map(), bookmarks: [] });
                }
                node = node.children.get(part);
            }
            node.bookmarks.push(res);
        });
        return root;
    }

    function countInNode(node) {
        let total = node.bookmarks.length;
        node.children.forEach(c => { total += countInNode(c); });
        return total;
    }
    function countCatInNode(node, cat) {
        let n = 0;
        node.bookmarks.forEach(r => { if (getStatusCategory(r) === cat) n++; });
        node.children.forEach(c => { n += countCatInNode(c, cat); });
        return n;
    }

    // ── Render Tree ───────────────────────────────────────────
    function renderTree() {
        const searchTerm  = searchInput.value.toLowerCase();
        const filterVal   = statusFilter.value;
        const isFiltering = searchTerm !== '' || filterVal !== 'all';

        const filtered = allResults.filter(res => {
            const matchSearch = !searchTerm ||
                res.name.toLowerCase().includes(searchTerm) ||
                res.url.toLowerCase().includes(searchTerm) ||
                res.folder.toLowerCase().includes(searchTerm);
            const cat = getStatusCategory(res);
            const matchFilter = filterVal === 'all' || cat === filterVal;
            return matchSearch && matchFilter;
        });

        treeCount.textContent = `מציג ${filtered.length} מתוך ${allResults.length} סימניות`;
        treeContainer.innerHTML = '';

        if (filtered.length === 0) {
            treeContainer.innerHTML = '<p style="color:#64748b; padding:1rem 0.5rem;">לא נמצאו תוצאות.</p>';
            return;
        }

        const tree = buildTree(filtered);
        renderTreeNode(tree, treeContainer, 0, isFiltering);
    }

    function renderTreeNode(node, container, depth, forceExpand) {
        // Folders
        node.children.forEach((child, folderName) => {
            const folderEl = document.createElement('div');
            folderEl.className = 'tree-folder';

            const total   = countInNode(child);
            const broken  = countCatInNode(child, 'broken');
            const redir   = countCatInNode(child, 'redirect');
            // Top-level folders open by default; deeper folders collapsed unless filtering
            const isOpen  = forceExpand || depth === 0;

            // Header
            const header = document.createElement('div');
            header.className = 'folder-header';

            const toggle = document.createElement('span');
            toggle.className = 'folder-toggle' + (isOpen ? ' open' : '');
            toggle.textContent = '▶';

            const icon = document.createElement('span');
            icon.className = 'folder-icon';
            icon.textContent = '📁';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'folder-name';
            nameSpan.textContent = folderName;

            const meta = document.createElement('div');
            meta.className = 'folder-meta';

            const totalSpan = document.createElement('span');
            totalSpan.className = 'folder-total';
            totalSpan.textContent = `(${total})`;
            meta.appendChild(totalSpan);

            if (broken > 0) {
                const b = document.createElement('span');
                b.className = 'folder-broken-badge';
                b.textContent = `❌ ${broken}`;
                meta.appendChild(b);
            }
            if (redir > 0) {
                const r = document.createElement('span');
                r.className = 'folder-redirect-badge';
                r.textContent = `🔄 ${redir}`;
                meta.appendChild(r);
            }

            header.appendChild(toggle);
            header.appendChild(icon);
            header.appendChild(nameSpan);
            header.appendChild(meta);

            // Children container
            const childrenDiv = document.createElement('div');
            childrenDiv.className = 'folder-children' + (isOpen ? '' : ' collapsed');

            header.addEventListener('click', () => {
                const nowOpen = toggle.classList.toggle('open');
                // update folder icon
                icon.textContent = nowOpen ? '📂' : '📁';
                childrenDiv.classList.toggle('collapsed', !nowOpen);
            });

            folderEl.appendChild(header);
            folderEl.appendChild(childrenDiv);
            container.appendChild(folderEl);

            renderTreeNode(child, childrenDiv, depth + 1, forceExpand);
        });

        // Bookmarks at this level
        node.bookmarks.forEach(res => {
            container.appendChild(createBookmarkRow(res));
        });
    }

    // ── Bookmark Row ──────────────────────────────────────────
    function esc(str) {
        return String(str)
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/"/g, '&quot;');
    }

    function createBookmarkRow(res) {
        const cat = getStatusCategory(res);
        const row = document.createElement('div');
        row.className = 'bookmark-row';

        // Badge
        let badgeHtml = '';
        if (cat === 'ok')
            badgeHtml = `<span class="badge status-ok">${res.status}</span>`;
        else if (cat === 'protected')
            badgeHtml = `<span class="badge status-protected">${res.status}</span>`;
        else if (cat === 'broken') {
            const e = res.status === 0 ? '✗' : res.status;
            badgeHtml = `<span class="badge status-error">${e}</span>`;
        } else if (cat === 'redirect')
            badgeHtml = `<span class="badge status-redirect">↩${res.status}</span>`;
        else
            badgeHtml = `<span class="badge">${res.status}</span>`;

        // Action buttons
        let actHtml = `<a href="${res.url}" target="_blank" class="action-btn" title="פתח קישור">🔗</a>`;
        if (cat === 'broken') {
            actHtml += `<button class="action-btn" onclick="searchWeb('${esc(res.name)}','${esc(res.url)}')" title="חפש חלופות">🔍</button>`;
            actHtml += `<button class="action-btn" onclick="editBookmark('${esc(res.url)}')" title="ערוך">✏️</button>`;
        } else if (cat === 'redirect') {
            actHtml += `<button class="action-btn" onclick="editBookmark('${esc(res.url)}','${esc(res.final_url || '')}')" title="עדכן כתובת">🔄</button>`;
            actHtml += `<button class="action-btn" onclick="editBookmark('${esc(res.url)}')" title="ערוך">✏️</button>`;
        } else {
            actHtml += `<button class="action-btn" onclick="editBookmark('${esc(res.url)}')" title="ערוך">✏️</button>`;
        }

        // Extra info
        let extraHtml = '';
        if (cat === 'broken' && res.error)
            extraHtml = `<span class="bookmark-error" title="${res.error}">${res.error}</span>`;
        else if (cat === 'redirect' && res.final_url)
            extraHtml = `<a href="${res.final_url}" target="_blank" class="bookmark-url" title="${res.final_url}" dir="ltr">➡ ${res.final_url}</a>`;

        row.innerHTML = `
            <div class="btn-group">${actHtml}</div>
            ${badgeHtml}
            <span class="bookmark-name" title="${res.name}">${res.name}</span>
            <a href="${res.url}" target="_blank" class="bookmark-url" title="${res.url}" dir="ltr">${res.url}</a>
            ${extraHtml}
        `;
        return row;
    }

    // ── Stat Card Clicks ──────────────────────────────────────
    document.querySelectorAll('.stat-card[data-filter]').forEach(card => {
        card.addEventListener('click', () => {
            statusFilter.value = card.dataset.filter;
            renderTree();
        });
    });

    searchInput.addEventListener('input', renderTree);
    statusFilter.addEventListener('change', renderTree);

    window.triggerRescan = () => scanBtn.click();
});

// ── Global: Search Web Modal ──────────────────────────────────
window.searchWeb = async (query, oldUrl) => {
    const modal    = document.getElementById('searchModal');
    const queryTxt = document.getElementById('searchQueryText');
    const results  = document.getElementById('searchResults');

    modal.classList.remove('hidden');
    queryTxt.textContent = `מחפש תוצאות עבור: "${query}"...`;
    results.innerHTML = '<div class="spinner"></div> מחפש...';

    try {
        const r = await fetch('/api/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query })
        });
        const data = await r.json();
        if (data.error) throw new Error(data.error);

        results.innerHTML = '';
        if (!data.results.length) { results.innerHTML = '<p>לא נמצאו תוצאות.</p>'; return; }

        data.results.forEach(res => {
            const item = document.createElement('div');
            item.className = 'search-result-item';
            item.innerHTML = `
                <h4>${res.title}</h4>
                <div class="search-url">${res.href}</div>
                <p>${res.body}</p>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn primary use-btn" style="flex:1; margin:0;"
                        onclick="replaceBookmarkDirectly('${oldUrl}','${res.href}')">עדכן קישור בקובץ</button>
                    <button class="btn ghost use-btn" style="margin:0; padding:0.5rem 1rem;"
                        onclick="copyToClipboard('${res.href}')">העתק</button>
                </div>`;
            results.appendChild(item);
        });
    } catch (e) {
        results.innerHTML = `<p style="color:#ef4444;">שגיאה בחיפוש: ${e.message}</p>`;
    }
};

window.copyToClipboard = text => {
    navigator.clipboard.writeText(text).then(() => alert('הקישור הועתק בהצלחה!'));
};

window.replaceBookmarkDirectly = async (oldUrl, newUrl) => {
    const filePath = document.getElementById('filePath').value.trim();
    if (!filePath) return;
    try {
        const r = await fetch('/api/edit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_path: filePath, old_url: oldUrl, new_url: newUrl })
        });
        if (!r.ok) { const err = await r.json(); throw new Error(err.detail || 'שגיאה'); }
        document.getElementById('searchModal').classList.add('hidden');
        if (window.triggerRescan) window.triggerRescan();
    } catch (e) { alert('שגיאה: ' + e.message); }
};

window.editBookmark = async (oldUrl, suggestedUrl = '') => {
    const filePath = document.getElementById('filePath').value.trim();
    const newUrl = prompt(
        'עריכת סימניה:\nהזן את הכתובת החדשה.\n\nשים לב: זה יערוך ישירות את קובץ ה-HTML!',
        suggestedUrl || oldUrl
    );
    if (!newUrl || newUrl === oldUrl) return;
    try {
        const r = await fetch('/api/edit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_path: filePath, old_url: oldUrl, new_url: newUrl })
        });
        if (!r.ok) { const err = await r.json(); throw new Error(err.detail || 'שגיאה'); }
        if (window.triggerRescan) window.triggerRescan();
    } catch (e) { alert('שגיאה: ' + e.message); }
};

document.getElementById('closeSearchModal').addEventListener('click', () => {
    document.getElementById('searchModal').classList.add('hidden');
});
    </script>
